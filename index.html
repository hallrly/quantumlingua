<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumLingua - Work in Progress</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .logo {
            width: 120px;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0px 0px 10px rgba(0, 255, 255, 0.8));
        }

        .wip-text {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin: 50px 0 10px;
            text-shadow: 0px 0px 15px rgba(0, 255, 255, 0.7);
        }

        .stay-tuned {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .contact {
            font-size: 1rem;
            color: cyan;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .contact:hover {
            color: #00ffff;
            text-shadow: 0px 0px 8px #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="QuantumLingua Logo" class="logo">
        <h1 class="wip-text">Work in Progress</h1>
        <p class="stay-tuned">Stay tuned for a wider experience</p>
        <a href="mailto:business@quantumlingua.com" class="contact">business@quantumlingua.com</a>
    </div>
</body>
</html>
