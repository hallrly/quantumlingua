<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantumLingua – Work in Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 3px;
      margin-bottom: 10px;
      animation: flicker 1.5s infinite alternate;
    }

    p {
      font-size: 1.2rem;
      color: #aaa;
    }

    @keyframes flicker {
      0% { opacity: 1; text-shadow: 0 0 10px #aaa; }
      100% { opacity: 0.8; text-shadow: 0 0 20px #0ff; }
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA..." alt="QuantumLingua Logo">
  <h1>Work in Progress</h1>
  <p>We’re building something amazing. Stay tuned.</p>
  <footer>© QuantumLingua 2025</footer>
</body>
</html>
